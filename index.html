<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session Analytics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14; --surface: #14141f; --surface2: #1c1c2e; --border: #2a2a42;
      --accent: #7c6af7; --accent2: #a78bfa; --text: #e2e2f0; --muted: #8888aa;
      --green: #34d399; --yellow: #fbbf24; --red: #f87171; --r: 10px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 24px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 200;
    }
    .logo { font-size: 16px; font-weight: 700; color: var(--accent2); }
    .count { font-size: 12px; color: var(--muted); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .api-lbl { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .api-inp {
      padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 12px; width: 200px;
    }
    .api-inp::placeholder { color: var(--muted); }
    .btn {
      padding: 6px 14px; background: var(--accent); border: none; border-radius: 6px;
      color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .82; }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .status { font-size: 12px; }
    .ok { color: var(--green); } .err { color: var(--red); }

    /* ── FILTER BAR ── */
    .filterbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
    }
    .fg { display: flex; flex-direction: column; gap: 3px; }
    .fg label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
    .fi, .fs {
      padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px; height: 32px;
    }
    .fi { width: 150px; } .fi::placeholder { color: var(--muted); }
    .fs { width: 175px; }
    .fd { width: 130px; }

    /* ── LIST VIEW ── */
    #listView { min-height: calc(100vh - 97px); }
    .session-list { width: 100%; border-collapse: collapse; }
    .session-list thead th {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--muted); text-align: left; white-space: nowrap;
    }
    .session-list tbody tr {
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background .12s;
    }
    .session-list tbody tr:hover { background: var(--surface2); }
    .session-list td { padding: 12px 16px; vertical-align: middle; }

    .leader-cell { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .avatar-fallback {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .leader-name { font-size: 13px; color: var(--text); max-width: 120px; overflow: hidden; text-overflow: ellipsis; }

    .session-name-cell { max-width: 260px; }
    .s-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
    .s-tag { display: inline-block; margin-top: 4px; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: rgba(124,106,247,.12); border: 1px solid rgba(124,106,247,.25); color: var(--accent2); }

    .date-cell { font-size: 13px; color: var(--muted); white-space: nowrap; }
    .metrics-cell { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .metrics-cell span { display: block; }

    .score-pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 700; white-space: nowrap;
    }
    .sh { background: rgba(52,211,153,.15); color: var(--green); }
    .sm { background: rgba(251,191,36,.15); color: var(--yellow); }
    .sl { background: rgba(248,113,113,.15); color: var(--red); }

    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px;
    }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DETAIL VIEW ── */
    #detailView { display: none; min-height: calc(100vh - 49px); }

    .detail-back {
      padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted);
      cursor: pointer; border: none; background: none; transition: color .15s;
    }
    .back-btn:hover { color: var(--text); }

    .detail-hero {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 24px 32px; display: flex; align-items: flex-start; gap: 20px;
    }
    .hero-avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--border); }
    .hero-avatar-fallback {
      width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #fff; border: 2px solid var(--border);
    }
    .hero-info { flex: 1; }
    .hero-title { font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
    .hero-sub { font-size: 13px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 10px; }
    .hero-sub strong { color: var(--text); }
    .hero-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .chip { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
    .chip-accent { background: rgba(124,106,247,.12); border-color: rgba(124,106,247,.3); color: var(--accent2); }
    .hero-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .hero-link {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; font-size: 12px; color: var(--text); cursor: pointer;
      transition: border-color .15s;
    }
    .hero-link:hover { border-color: var(--accent); }

    .detail-score-bar {
      padding: 16px 32px; background: var(--surface2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    .big-score { font-size: 36px; font-weight: 900; flex-shrink: 0; }
    .bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; max-width: 280px; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .score-label { font-size: 12px; color: var(--muted); }

    .detail-body {
      padding: 24px 32px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) { .detail-body { grid-template-columns: 1fr; } }

    .section { display: flex; flex-direction: column; gap: 16px; }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--accent); margin-bottom: 2px;
    }
    .meta-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px;
    }
    .meta-rows { display: flex; flex-direction: column; gap: 10px; }
    .meta-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .meta-k { font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .meta-v { font-size: 13px; text-align: right; word-break: break-word; max-width: 180px; }
    .meta-v a { color: var(--accent2); }
    .meta-v a:hover { text-decoration: underline; }

    .text-block {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 14px 16px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; color: var(--text);
    }
    .hook-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
    }
    .hook-item {
      padding: 10px 14px 10px 16px; font-size: 13px; line-height: 1.5;
      border-left: 3px solid var(--accent); border-bottom: 1px solid var(--border);
    }
    .hook-item:last-child { border-bottom: none; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <span class="logo">Session Analytics</span>
  <span class="count" id="countEl"></span>
  <div class="topbar-right">
    <span class="api-lbl">API Key</span>
    <input id="apiInp" class="api-inp" type="password" placeholder="AIza…" />
    <button class="btn" onclick="loadData()">Load</button>
    <span class="status" id="statusEl"></span>
  </div>
</header>

<!-- LIST VIEW -->
<div id="listView">
  <div class="filterbar">
    <div class="fg">
      <label>Leader</label>
      <select id="fLeader" class="fs" onchange="filter()"><option value="">All leaders</option></select>
    </div>
    <div class="fg">
      <label>Instance ID</label>
      <input id="fInstance" class="fi" placeholder="e.g. 2868" oninput="filter()" />
    </div>
    <div class="fg">
      <label>Date from</label>
      <input id="fFrom" class="fi fd" type="date" onchange="filter()" />
    </div>
    <div class="fg">
      <label>Date to</label>
      <input id="fTo" class="fi fd" type="date" onchange="filter()" />
    </div>
    <div class="fg">
      <label>Session name</label>
      <input id="fName" class="fi" style="width:180px" placeholder="Search…" oninput="filter()" />
    </div>
    <button class="btn btn-ghost" style="height:32px;align-self:flex-end" onclick="clearFilters()">Clear</button>
  </div>
  <div id="tableWrap">
    <div class="empty-state">Enter your Google API Key and click <strong>Load</strong>.<br><br>
      The spreadsheet must be set to <em>"Anyone with the link can view"</em>.</div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="detailView">
  <div class="detail-back">
    <button class="back-btn" onclick="showList()">&#8592; Back to Sessions</button>
  </div>
  <div id="detailContent"></div>
</div>

<script>
  const SPREADSHEET_ID = '18eYwB8ls5PrOrBvKatDRYKJv-qvxa0XpI2oSrEo2WW0';
  const DEFAULT_API_KEY = 'AIzaSyDRPUoX5COg5kSoks9U-e1ud8KiL8o9pUc';
  const LS_KEY = 'sa_api_key';

  const D = { sessionName:0,startDate:1,leaderName:2,instanceId:3,sessionLink:4,pdpPrice:5,
    primaryTag:6,l1Tags:7,tags:8,techniques:9,sessionIdWise:10,totalRegs:11,attendedUsers:12,
    durationMins:13,medianDuration:14,avgDuration:15,transcriptSummary:16,chatSummary:17,
    chatTop5:18,sessionTags:19,sessionScore:20,scoreSummary:21,transcriptLink:22,chatLink:23 };
  const M = { instanceId:1, coreMessage:12, painPoints:13, hookLines:14, friendPitch:15 };

  let allSessions = [], filteredSessions = [];

  // ── Init
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem(LS_KEY) || DEFAULT_API_KEY;
    document.getElementById('apiInp').value = saved;
    window.addEventListener('hashchange', onHash);
    loadData();
  });

  // ── Fetch
  async function fetchSheet(range, key) {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?key=${key}`;
    const res = await fetch(url);
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'HTTP ' + res.status); }
    return (await res.json()).values || [];
  }

  async function loadData() {
    const key = document.getElementById('apiInp').value.trim();
    if (!key) { setStatus('Enter an API key.', true); return; }
    localStorage.setItem(LS_KEY, key);
    setStatus('<span class="spinner"></span>Loading…');
    setTableHtml('<div class="empty-state"><span class="spinner"></span>Fetching sessions…</div>');

    try {
      const [dRows, mRows] = await Promise.all([
        fetchSheet('Details!A2:X2000', key),
        fetchSheet('Master!A2:P2000', key),
      ]);
      const mMap = {};
      mRows.forEach(r => { if (r[M.instanceId]) mMap[r[M.instanceId]] = r; });

      allSessions = dRows.map(r => {
        const id = r[D.instanceId] || '';
        const mr = mMap[id] || [];
        return {
          instanceId:r[D.instanceId]||'', sessionName:r[D.sessionName]||'',
          startDate:r[D.startDate]||'', leaderName:r[D.leaderName]||'',
          sessionLink:r[D.sessionLink]||'', pdpPrice:r[D.pdpPrice]||'',
          primaryTag:r[D.primaryTag]||'', l1Tags:r[D.l1Tags]||'',
          tags:r[D.tags]||'', techniques:r[D.techniques]||'',
          sessionIdWise:r[D.sessionIdWise]||'', totalRegs:r[D.totalRegs]||'0',
          attendedUsers:r[D.attendedUsers]||'0', durationMins:r[D.durationMins]||'',
          medianDuration:r[D.medianDuration]||'', avgDuration:r[D.avgDuration]||'',
          transcriptSummary:r[D.transcriptSummary]||'', chatSummary:r[D.chatSummary]||'',
          chatTop5:r[D.chatTop5]||'', sessionTags:r[D.sessionTags]||'',
          sessionScore:parseInt(r[D.sessionScore]||'0',10)||0,
          scoreSummary:r[D.scoreSummary]||'',
          transcriptLink:r[D.transcriptLink]||'', chatLink:r[D.chatLink]||'',
          coreMessage:mr[M.coreMessage]||'', painPoints:mr[M.painPoints]||'',
          hookLines:mr[M.hookLines]||'', friendPitch:mr[M.friendPitch]||'',
        };
      });

      // Sort by date descending
      allSessions.sort((a, b) => new Date(b.startDate) - new Date(a.startDate));

      populateLeaders();
      filter();
      setStatus(`✓ ${allSessions.length} session(s) loaded`);
      onHash(); // handle deep link
    } catch(e) {
      setStatus(e.message, true);
      setTableHtml(`<div class="empty-state err">${esc(e.message)}</div>`);
    }
  }

  function setStatus(html, err=false) {
    const el = document.getElementById('statusEl');
    el.innerHTML = html; el.className = 'status ' + (err ? 'err' : 'ok');
  }
  function setTableHtml(html) { document.getElementById('tableWrap').innerHTML = html; }

  // ── Leaders dropdown
  function populateLeaders() {
    const leaders = [...new Set(allSessions.map(s=>s.leaderName).filter(Boolean))].sort();
    const sel = document.getElementById('fLeader');
    sel.innerHTML = '<option value="">All leaders</option>';
    leaders.forEach(l => { const o=document.createElement('option'); o.value=l; o.textContent=l; sel.appendChild(o); });
  }

  // ── Filter
  function filter() {
    const fl = document.getElementById('fLeader').value.toLowerCase();
    const fi = document.getElementById('fInstance').value.trim();
    const ff = document.getElementById('fFrom').value;
    const ft = document.getElementById('fTo').value;
    const fn = document.getElementById('fName').value.toLowerCase();

    filteredSessions = allSessions.filter(s => {
      if (fl && !s.leaderName.toLowerCase().includes(fl)) return false;
      if (fi && !s.instanceId.includes(fi)) return false;
      if (fn && !s.sessionName.toLowerCase().includes(fn)) return false;
      const d = s.startDate.substring(0,10);
      if (ff && d < ff) return false;
      if (ft && d > ft) return false;
      return true;
    });

    document.getElementById('countEl').textContent = `${filteredSessions.length} / ${allSessions.length} sessions`;
    renderTable();
  }

  function clearFilters() {
    ['fLeader','fInstance','fFrom','fTo','fName'].forEach(id => {
      const el = document.getElementById(id);
      el.tagName === 'SELECT' ? (el.value='') : (el.value='');
    });
    filter();
  }

  // ── Render table
  function renderTable() {
    if (!filteredSessions.length) {
      setTableHtml('<div class="empty-state">No sessions match your filters.</div>');
      return;
    }
    const rows = filteredSessions.map(s => {
      const d = fmtDate(s.startDate);
      const sc = scoreClass(s.sessionScore);
      const av = avatarImg(s.leaderName, 36);
      return `<tr onclick="openDetail('${esc(s.instanceId)}')">
        <td><div class="leader-cell">${av}<span class="leader-name">${esc(s.leaderName)}</span></div></td>
        <td class="session-name-cell">
          <div class="s-name">${esc(s.sessionName)||'(No name)'}</div>
          ${s.primaryTag ? `<span class="s-tag">${esc(s.primaryTag)}</span>` : ''}
        </td>
        <td class="date-cell">${d}</td>
        <td class="metrics-cell">
          ${s.durationMins ? `<span>⏱ ${s.durationMins} min</span>` : ''}
          ${s.attendedUsers ? `<span>👥 ${s.attendedUsers} attended</span>` : ''}
        </td>
        <td>${s.sessionScore ? `<span class="score-pill ${sc}">${s.sessionScore}</span>` : '—'}</td>
      </tr>`;
    }).join('');

    setTableHtml(`<table class="session-list">
      <thead><tr>
        <th>Leader</th><th>Session</th><th>Date</th><th>Metrics</th><th>Score</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`);
  }

  // ── Avatar
  const COLORS = ['6d5ef7','ec4899','f97316','14b8a6','f59e0b','0ea5e9','84cc16','e11d48'];
  function avatarColor(name) {
    let h = 0; for (const c of name) h = (h*31 + c.charCodeAt(0)) & 0xffff;
    return COLORS[h % COLORS.length];
  }
  function avatarImg(name, size) {
    if (!name) return `<div class="avatar-fallback" style="width:${size}px;height:${size}px;background:#333">?</div>`;
    const initials = name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const bg = avatarColor(name);
    // Try soulsensei CDN from session link; fall back to initials div
    return `<div class="avatar-fallback" style="width:${size}px;height:${size}px;background:#${bg};font-size:${Math.round(size*0.35)}px">${initials}</div>`;
  }

  // ── Navigation
  function openDetail(id) { window.location.hash = id; }
  function showList() { window.location.hash = ''; }

  function onHash() {
    const id = window.location.hash.replace('#','');
    if (id && allSessions.length) {
      const s = allSessions.find(x=>x.instanceId===id);
      if (s) { renderDetail(s); return; }
    }
    document.getElementById('listView').style.display = 'block';
    document.getElementById('detailView').style.display = 'none';
  }

  // ── Render detail
  function renderDetail(s) {
    document.getElementById('listView').style.display = 'none';
    document.getElementById('detailView').style.display = 'block';

    const scoreColor = s.sessionScore >= 75 ? 'var(--green)' : s.sessionScore >= 50 ? 'var(--yellow)' : 'var(--red)';
    const bigAv = avatarImg(s.leaderName, 72).replace('avatar-fallback','hero-avatar-fallback');
    const dateFull = s.startDate ? new Date(s.startDate).toLocaleString('en-IN', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const sc = scoreClass(s.sessionScore);

    const metaRow = (k,v,link=false) => {
      if (!v) return '';
      const val = link ? `<a href="${v}" target="_blank" rel="noopener">Open ↗</a>` : esc(v);
      return `<div class="meta-row"><span class="meta-k">${k}</span><span class="meta-v">${val}</span></div>`;
    };

    const hookHtml = s.hookLines
      ? '<div class="hook-card">' + s.hookLines.split('\n').filter(l=>l.trim()).map(l=>`<div class="hook-item">${esc(l.replace(/^\d+\.\s*/,''))}</div>`).join('') + '</div>'
      : '';

    const tagChips = s.sessionTags
      ? s.sessionTags.split(',').map(t=>`<span class="chip chip-accent">${esc(t.trim())}</span>`).join('')
      : '';

    document.getElementById('detailContent').innerHTML = `
      <!-- Hero -->
      <div class="detail-hero">
        ${bigAv}
        <div class="hero-info">
          <div class="hero-title">${esc(s.sessionName)||'(No name)'}</div>
          <div class="hero-sub">
            <strong>${esc(s.leaderName)}</strong>
            <span>${dateFull}</span>
            ${s.durationMins ? `<span>⏱ ${s.durationMins} min</span>` : ''}
            ${s.attendedUsers ? `<span>👥 ${s.attendedUsers} attended</span>` : ''}
            ${s.pdpPrice ? `<span>₹${esc(s.pdpPrice)}</span>` : ''}
          </div>
          <div class="hero-chips">
            ${s.primaryTag ? `<span class="chip chip-accent">${esc(s.primaryTag)}</span>` : ''}
            ${s.l1Tags ? s.l1Tags.split(',').map(t=>`<span class="chip">${esc(t.trim())}</span>`).join('') : ''}
            <span class="score-pill ${sc}" style="margin-left:4px">${s.sessionScore || '—'}</span>
          </div>
          <div class="hero-links">
            ${s.sessionLink ? `<a href="${s.sessionLink}" target="_blank" rel="noopener" class="hero-link">🌐 Session Page</a>` : ''}
            ${s.transcriptLink ? `<a href="${s.transcriptLink}" target="_blank" rel="noopener" class="hero-link">📄 Transcript</a>` : ''}
            ${s.chatLink ? `<a href="${s.chatLink}" target="_blank" rel="noopener" class="hero-link">💬 Chat</a>` : ''}
          </div>
        </div>
      </div>

      <!-- Score bar -->
      ${s.sessionScore ? `
      <div class="detail-score-bar">
        <span class="big-score" style="color:${scoreColor}">${s.sessionScore}</span>
        <div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${s.sessionScore}%;background:${scoreColor}"></div></div>
          <div class="score-label" style="margin-top:4px">Session Score out of 100</div>
        </div>
        ${tagChips ? `<div style="margin-left:24px;display:flex;flex-wrap:wrap;gap:6px">${tagChips}</div>` : ''}
      </div>` : ''}

      <!-- Body -->
      <div class="detail-body">

        <!-- LEFT: metadata -->
        <div class="section">
          <div class="section-title">Session Details</div>
          <div class="meta-card">
            <div class="meta-rows">
              ${metaRow('Instance ID', s.instanceId)}
              ${metaRow('Session ID (Wise)', s.sessionIdWise)}
              ${metaRow('Total Registrations', s.totalRegs)}
              ${metaRow('Attended Users', s.attendedUsers)}
              ${metaRow('Duration (mins)', s.durationMins)}
              ${metaRow('Median Duration', s.medianDuration)}
              ${metaRow('Avg Duration', s.avgDuration)}
              ${metaRow('PDP Price', s.pdpPrice ? '₹' + s.pdpPrice : '')}
              ${metaRow('Primary Tag', s.primaryTag)}
              ${metaRow('L1 Tags', s.l1Tags)}
              ${metaRow('Tags', s.tags)}
              ${metaRow('Techniques', s.techniques)}
            </div>
          </div>
        </div>

        <!-- RIGHT: analysis -->
        <div class="section">

          ${s.scoreSummary ? `
          <div>
            <div class="section-title">Score Summary</div>
            <div class="text-block">${esc(s.scoreSummary)}</div>
          </div>` : ''}

          ${s.transcriptSummary ? `
          <div>
            <div class="section-title">Transcript Summary</div>
            <div class="text-block">${esc(s.transcriptSummary)}</div>
          </div>` : ''}

          ${s.chatSummary ? `
          <div>
            <div class="section-title">Chat Summary</div>
            <div class="text-block">${esc(s.chatSummary)}</div>
            ${s.chatTop5 ? `<div class="text-block" style="margin-top:8px">${esc(s.chatTop5)}</div>` : ''}
          </div>` : ''}

          ${s.coreMessage ? `
          <div>
            <div class="section-title">Core Message</div>
            <div class="text-block">${esc(s.coreMessage)}</div>
          </div>` : ''}

          ${s.painPoints ? `
          <div>
            <div class="section-title">Pain Points</div>
            <div class="text-block">${esc(s.painPoints)}</div>
          </div>` : ''}

          ${hookHtml ? `
          <div>
            <div class="section-title">Hook Lines</div>
            ${hookHtml}
          </div>` : ''}

          ${s.friendPitch ? `
          <div>
            <div class="section-title">Audience Pitch</div>
            <div class="text-block">${esc(s.friendPitch)}</div>
          </div>` : ''}

        </div>
      </div>
    `;
  }

  // ── Helpers
  function scoreClass(sc) { return sc >= 75 ? 'sh' : sc >= 50 ? 'sm' : 'sl'; }
  function fmtDate(d) {
    if (!d) return '—';
    try { return new Date(d).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }
    catch { return d; }
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
